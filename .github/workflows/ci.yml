name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt --check

      - name: Run Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --all-targets

      - name: Verify Windows paths and socket recovery
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo test --test cli line_ending_normalization_accepts_windows_fixtures
          cargo test --test cli cli_replays_jsonl_post_with_headers_and_body
          cargo test --test http_run fixed_request_run_abandons_requests_after_connection_refusal

      - name: Verify package
        run: cargo package --allow-dirty

      - name: Smoke test release binary
        run: cargo run --release -- --help

      - name: Invoke release binary from PowerShell
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cargo build --release
          $metadata = cargo metadata --no-deps --format-version 1 | ConvertFrom-Json
          $expected = "rload $($metadata.packages[0].version)"
          $actual = & .\target\release\rload.exe --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          if ($actual -ne $expected) { throw "expected '$expected', got '$actual'" }
